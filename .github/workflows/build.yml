name: Build Windows exe

on:
  push:
    tags:
      - 'v*'          # pushing a version tag (e.g. v1.0.0) publishes a Release
  workflow_dispatch:   # manual run from the Actions tab -> downloadable artifact

permissions:
  contents: write      # needed to create the Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build installer + portable exe
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

      # SHA256 of every exe goes into the release notes so users can verify
      # their download (the binaries are unsigned — see README "First run").
      - name: Compute SHA256 checksums (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $lines = @('## SHA256 checksums', '```')
          Get-ChildItem dist/*.exe | Sort-Object Name | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $lines += "$h  $($_.Name)"
          }
          $lines += '```'
          $lines += ''
          $lines += 'Verify with: `Get-FileHash <file> -Algorithm SHA256` (PowerShell).'
          $lines | Out-File checksums.md -Encoding utf8

      # electron-builder already published the release above (it auto-publishes
      # to GitHub whenever GH_TOKEN is set and the build is on a tag ref) — the
      # exe/blockmap/latest.yml assets are already uploaded there under
      # electron-builder's own hyphen-safe naming. This step must NOT pass
      # `files:` again, or the same binaries get re-uploaded a second time
      # under GitHub's space-to-dot-sanitized names, duplicating every asset.
      - name: Add generated release notes + checksums (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: checksums.md
