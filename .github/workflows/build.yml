name: Build Windows exe

on:
  push:
    tags:
      - 'v*'          # pushing a version tag (e.g. v1.0.0) publishes a Release
  workflow_dispatch:   # manual run from the Actions tab -> downloadable artifact

permissions:
  contents: write      # needed to create the Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build installer + portable exe
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

      # electron-builder already published the release above (it auto-publishes
      # to GitHub whenever GH_TOKEN is set and the build is on a tag ref, and
      # always creates it before this step runs) — the exe/blockmap/latest.yml
      # assets are already uploaded there under electron-builder's own
      # hyphen-safe naming, so nothing here should re-upload `files:`. But
      # electron-builder creates that release as a DRAFT and does not
      # publish it itself; something downstream has to un-draft it or it
      # never appears on the public Releases page and electron-updater's
      # "latest release" check never sees it (confirmed: v1.9.5 and v1.9.6
      # shipped stuck as drafts before this comment was added — the old
      # softprops/action-gh-release step happened to un-draft it as a side
      # effect of its update call, which masked the requirement). The `gh
      # release edit --draft=false` below makes that explicit instead of
      # relying on another tool's incidental behavior.
      #
      # The release body also needs to be set explicitly via `gh release
      # edit`: GitHub's REST API only honors `generate_release_notes` on
      # release *creation*, not on updates to an existing release — so a
      # softprops/action-gh-release step with generate_release_notes here
      # would silently no-op (confirmed empty on v1.8.3 through v1.9.4). The
      # dedicated generate-notes endpoint has no such restriction, so call it
      # directly and prepend SHA256 checksums so users can verify their
      # download (the binaries are unsigned — see README "First run").
      - name: Set release notes + SHA256 checksums (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = gh api "repos/${{ github.repository }}/releases/generate-notes" -f tag_name=$tag --jq .body

          # electron-builder writes dist/*.exe using the raw productName
          # ("Claude Usage Dashboard", with spaces), but its GitHub publisher
          # uploads the release asset under a hyphenated name. Match that
          # here so the filename next to each hash is what users actually see
          # on the Releases page.
          $lines = @('## SHA256 checksums', '```')
          Get-ChildItem dist/*.exe | Sort-Object Name | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $assetName = $_.Name -replace ' ', '-'
            $lines += "$h  $assetName"
          }
          $lines += '```'
          $lines += ''
          $lines += 'Verify with: `Get-FileHash <file> -Algorithm SHA256` (PowerShell).'
          $lines += ''
          $lines += $notes
          $lines -join "`n" | Out-File release-notes.md -Encoding utf8

          gh release edit $tag --notes-file release-notes.md --draft=false
