name: Build Windows exe

on:
  push:
    tags:
      - 'v*'          # pushing a version tag (e.g. v1.0.0) publishes a Release
  workflow_dispatch:   # manual run from the Actions tab -> downloadable artifact

permissions:
  contents: write      # needed to create the Release on tag builds

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build installer + portable exe
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
