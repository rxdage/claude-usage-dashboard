<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Claude Usage Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="panel">
    <div id="winbtns">
      <button id="btn-hide" title="隐藏到托盘">–</button>
      <button id="btn-close" title="退出">×</button>
    </div>

    <div id="main-row">
    <div id="gauge-session"></div>

    <div id="side">
      <div class="row" id="row-1">
        <div class="row-head">
          <span class="row-name" id="bar1-name">FABLE·5 <span class="wk">WK</span></span>
          <span class="row-val" id="bar1-val">–</span>
        </div>
        <div class="bar" id="bar1-bar"></div>
      </div>

      <div class="row" id="row-2">
        <div class="row-head">
          <span class="row-name" id="bar2-name">ALL <span class="wk">WK</span></span>
          <span class="row-val" id="bar2-val">–</span>
        </div>
        <div class="bar" id="bar2-bar"></div>
      </div>

      <div class="row foot">
        <span class="foot-item"><b id="foot-left-val">$0.00</b><i id="foot-left-label">today</i></span>
        <span class="foot-sep"></span>
        <span class="foot-item"><b id="foot-right-val">--</b><i id="foot-right-label">wk reset</i></span>
        <span class="lamp" id="lamp-live">●</span>
      </div>
    </div>
    </div><!-- /main-row -->

    <div id="secondary" class="hidden" title="点击切换主显示 / click to switch">
      <span class="sec-live" id="sec-live">●</span>
      <span class="sec-name" id="sec-name">CODEX</span>
      <span class="sec-metric">5H <span class="mini-bar"><i id="sec-s-fill"></i></span><b id="sec-s">–</b></span>
      <span class="sec-metric">WK <span class="mini-bar"><i id="sec-w-fill"></i></span><b id="sec-w">–</b></span>
      <span class="sec-swap">⇄</span>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
